<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkStream | Premium URL Tracking</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- GLASSMORPHIC AUTH SCREEN -->
    <div id="authScreen" class="auth-container">
        <div class="auth-card">
            <div class="logo">🔗 LinkStream</div>
            <h1 id="authTitle">Secure Access</h1>
            <p id="authSubtitle">Analyze your reach with precision</p>
            
            <div class="auth-form">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="usernameInput" placeholder="Enter username">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="passwordInput_Auth" placeholder="Enter password">
                </div>
                <button class="primary-btn pulse" id="loginBtn" onclick="handleLogin()">Login to Dashboard</button>
                <div class="auth-footer">
                    <span id="authToggleText">Need an account?</span>
                    <a href="#" onclick="toggleAuthMode()" id="authLink">Join Now</a>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN DASHBOARD (HIDDEN) -->
    <div id="appScreen" class="container" style="display:none;">
        <header class="glass-header">
            <div class="header-content">
                <div class="brand">
                    <span class="logo-small">🔗</span>
                    <div>
                        <h1>LinkStream</h1>
                        <p>User: <span id="userDisplayName" class="accent-text">--</span></p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" id="userTab" onclick="showPanel('userPanel', this)">Create Link</button>
            <button class="tab-btn" id="adminTab" onclick="showPanel('adminPanel', this); syncAllData();" style="display:none;">System Admin</button>
        </div>

        <!-- USER PANEL -->
        <div id="userPanel" class="view-panel active">
            <section class="shorten-card glass-card">
                <h2>Generate New Link</h2>
                <div class="input-group">
                    <input type="text" placeholder="https://very-long-url.com/analytics/tracker" id="urlInput">
                </div>

                <div class="advanced-grid">
                    <div class="input-group">
                        <label>Alias</label>
                        <input type="text" placeholder="my-custom-name" id="aliasInput">
                    </div>
                    <div class="input-group">
                        <label>Expiry</label>
                        <select id="expiryInput">
                            <option value="">Never</option>
                            <option value="1">1 Hour</option>
                            <option value="24">24 Hours</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Max Clicks</label>
                        <input type="number" placeholder="Unlimited" id="maxClicksInput">
                    </div>
                    <div class="input-group">
                        <label>Security</label>
                        <input type="password" placeholder="Add password" id="passwordInput_Link">
                    </div>
                </div>

                <button class="primary-btn" onclick="shorten()">Create Secure Link</button>
            </section>

            <h3 style="margin-top: 2.5rem; color: #94a3b8; font-weight: 500;">Recent Analytics</h3>
            <div class="stats-grid" id="userLinksGrid">
                <!-- User links cards -->
            </div>
        </div>

        <!-- ADMIN PANEL -->
        <div id="adminPanel" class="view-panel">
            <div class="admin-toolbar">
                <button class="primary-btn" onclick="window.location.href='/api/admin/export'" style="width: auto; padding: 0.8rem 2rem;">📥 Export Analytics CSV</button>
            </div>
            
            <div class="admin-table-container glass-card">
                <table>
                    <thead>
                        <tr>
                            <th>Short Code</th>
                            <th>Target URL</th>
                            <th>Creator</th>
                            <th>Clicks</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // BACKEND CONNECTION LOGIC
        // If the page is opened via VS Code Live Server (port 5500) or directly, 
        // fallback to the actual Java backend port (8081).
        const BASE_URL = window.location.port !== '8081' ? 'http://localhost:8081' : '';

        let currentUser = null;
        let isLoginMode = true;

        // AUTH LOGIC
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? "Secure Access" : "Join LinkStream";
            document.getElementById('authSubtitle').innerText = isLoginMode ? "Analyze your reach with precision" : "Start trackig your links for free today";
            document.getElementById('loginBtn').innerText = isLoginMode ? "Login to Dashboard" : "Create My Account";
            document.getElementById('authToggleText').innerText = isLoginMode ? "Need an account?" : "Already a member?";
            document.getElementById('authLink').innerText = isLoginMode ? "Join Now" : "Sign In";
        }

        async function handleLogin() {
            const u = document.getElementById('usernameInput').value;
            const p = document.getElementById('passwordInput_Auth').value;
            if(!u || !p) return;

            const endpoint = isLoginMode ? 'login' : 'signup';
            try {
                const res = await fetch(`${BASE_URL}/api/${endpoint}?u=${u}&p=${p}`);
                const data = await res.json();
                
                if (data.status === 'success') {
                    if (isLoginMode) {
                        currentUser = data;
                        enterApp();
                    } else {
                        alert("Account verified! Please sign in.");
                        toggleAuthMode();
                    }
                } else {
                    alert("Invalid Credentials: " + (data.error || "Please try again"));
                }
            } catch (e) { alert("Connectivity Error: Backend is unreachable."); }
        }

        function enterApp() {
            document.getElementById('authScreen').classList.add('fade-out');
            setTimeout(() => {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
                document.getElementById('userDisplayName').innerText = currentUser.username;
                
                if (currentUser.role === 'Admin') {
                    document.getElementById('adminTab').style.display = 'inline-block';
                    document.getElementById('adminOnlyToggle').style.display = 'flex';
                }
                syncAllData();
                setInterval(syncAllData, 5000);
            }, 300);
        }

        function logout() {
            location.reload();
        }

        function showPanel(panelId, btn) {
            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
            btn.classList.add('active');
        }

        async function shorten() {
            const urlInput = document.getElementById('urlInput');
            const aliasInput = document.getElementById('aliasInput');
            const expiryInput = document.getElementById('expiryInput');
            const maxInput = document.getElementById('maxClicksInput');
            const passInput = document.getElementById('passwordInput_Link');

            if (!urlInput.value) return;

            let query = `url=${encodeURIComponent(urlInput.value)}&creator=${currentUser.username}`;
            if (aliasInput.value) query += `&alias=${encodeURIComponent(aliasInput.value)}`;
            if (expiryInput.value) query += `&expiry=${expiryInput.value}`;
            if (maxInput.value) query += `&maxClicks=${maxInput.value}`;
            if (passInput.value) query += `&password=${encodeURIComponent(passInput.value)}`;

            try {
                const response = await fetch(`${BASE_URL}/api/shorten?${query}`);
                const data = await response.json();
                if (data.shortUrl) {
                    addLinkCard(data.shortUrl, urlInput.value, aliasInput.value || data.code, !!passInput.value, 0, 'None', false);
                    urlInput.value = aliasInput.value = '';
                } else { alert(data.error); }
            } catch (err) { alert("Operation Failed."); }
        }

        async function syncAllData() {
            if (!currentUser) return;
            
            try {
                // Admins fetch 'admin' to see all, Guests fetch their own username
                const fetchUser = (currentUser.role === 'Admin') ? 'admin' : currentUser.username;
                const response = await fetch(`${BASE_URL}/api/admin/stats?username=${fetchUser}`);
                const stats = await response.json();
                
                const grid = document.getElementById('userLinksGrid');
                const tbody = document.getElementById('adminTableBody');
                tbody.innerHTML = '';
                
                stats.forEach(s => {
                    // Admin Table
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><a href="/r/${s.code}" target="_blank" class="accent-text">/r/${s.code}</a></td>
                        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;">${s.url}</td>
                        <td>${s.creator}</td>
                        <td><strong>${s.clicks}</strong></td>
                        <td><span class="badge ${s.expired ? 'expired-badge' : 'active-badge'}">${s.expired ? 'Expired' : 'Active'}</span></td>
                        <td><button class="delete-mini" onclick="deleteCode('${s.code}')">Delete</button></td>
                    `;
                    tbody.appendChild(tr);

                    // Real-time Card Updates (RBAC aware)
                    if (s.creator === currentUser.username || currentUser.role === 'Admin') {
                        let card = document.getElementById(`card-${s.code}`);
                        if (!card) {
                            addLinkCard(`/r/${s.code}`, s.url, s.code, s.protected, s.clicks, s.topDevice, s.expired);
                        } else {
                            document.getElementById(`clicks-${s.code}`).innerText = s.clicks;
                            document.getElementById(`device-${s.code}`).innerText = s.topDevice || 'None';
                            const badgeGroup = card.querySelector('.badge-group');
                            if (s.expired && !badgeGroup.querySelector('.expired-badge')) {
                                badgeGroup.innerHTML += '<span class="badge expired-badge">Expired</span>';
                            }
                        }
                    }
                });
            } catch (e) {}
        }

        function addLinkCard(shortUrl, longUrl, code, isProtected, clicks, topDevice, expired) {
            const grid = document.getElementById('userLinksGrid');
            const card = document.createElement('div');
            card.id = `card-${code}`;
            card.className = 'url-card glass-card';
            card.innerHTML = `
                <div class="card-header">
                    <a href="${shortUrl}" target="_blank">short.ly/${code}</a>
                    <div class="badge-group">
                        ${isProtected ? '<span class="badge protected-badge">🔒 Locked</span>' : ''}
                        ${expired ? '<span class="badge expired-badge">Expired</span>' : '<span class="badge active-badge">Live</span>'}
                    </div>
                </div>
                <div class="long-url-label">${longUrl}</div>
                <div class="card-footer">
                    <div class="stat"><span id="clicks-${code}">${clicks}</span><label>CLICKS</label></div>
                    <div class="stat"><span id="device-${code}">${topDevice || 'None'}</span><label>TOP DEVICE</label></div>
                </div>
            `;
            grid.insertBefore(card, grid.firstChild);
        }

        async function deleteCode(code) {
            if (!confirm(`Permanently remove /r/${code}?`)) return;
            await fetch(`${BASE_URL}/api/admin/delete?code=${code}`);
            document.getElementById(`card-${code}`)?.remove();
            syncAllData();
        }
    </script>
</body>
</html>
